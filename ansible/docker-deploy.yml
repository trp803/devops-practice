---
- name: Install Docker and Deploy App
  hosts: webservers
  become: yes

  tasks:
    - name: Установить зависимости
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Создать папку для ключей
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Добавить GPG ключ Docker
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Добавить репозиторий Docker
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Установить Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Запустить и включить Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Добавить ubuntu в группу docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Остановить старый контейнер если есть
      shell: docker stop webapp || true

    - name: Удалить старый контейнер если есть
      shell: docker rm webapp || true

    - name: Запустить веб-приложение
      shell: |
        docker run -d \
          -p 80:80 \
          --name webapp \
          --restart always \
          nginx:alpine

    - name: Проверить что контейнер запущен
      shell: docker ps | grep webapp
      register: result

    - name: Показать результат
      debug:
        msg: "✅ Приложение запущено: {{ result.stdout }}"
