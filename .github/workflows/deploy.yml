name: Deploy DevOps App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Notify start
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="🚀 Деплой начался...
          Репозиторий: ${{ github.repository }}
          Ветка: ${{ github.ref_name }}
          Автор: ${{ github.actor }}"

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/devops-practice/final-project
            git pull origin main
            docker stop final-app || true
            docker rm final-app || true
            docker build -t final-app .
            docker run -d \
              -p 8888:80 \
              --name final-app \
              --restart always \
              final-app
            echo "✅ Deploy successful!"

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ Деплой успешен!
          Репозиторий: ${{ github.repository }}
          Ветка: ${{ github.ref_name }}
          Автор: ${{ github.actor }}
          Сайт: http://${{ secrets.SERVER_HOST }}:8888"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ Деплой упал!
          Репозиторий: ${{ github.repository }}
          Ветка: ${{ github.ref_name }}
          Автор: ${{ github.actor }}
          Проверь Actions: https://github.com/${{ github.repository }}/actions"
