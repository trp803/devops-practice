name: Deploy PROD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: final-app
  CONTAINER_NAME: final-app
  PORT: 8888

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set version
        id: version
        run: |
          echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "DATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Notify start
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="🚀 PROD деплой начался...
          Версия: ${{ steps.version.outputs.SHA }}
          Автор: ${{ github.actor }}
          Коммит: ${{ github.event.head_commit.message }}"

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_NAME,CONTAINER_NAME,PORT
          script: |
            cd ~/devops-practice
            git pull origin main

            # Сборка с версией
            SHA=$(git rev-parse --short HEAD)
            docker build -t $IMAGE_NAME:$SHA -t $IMAGE_NAME:latest ~/devops-practice/final-project

            # Деплой через скрипт
            bash bash/deploy.sh $CONTAINER_NAME $PORT $IMAGE_NAME:$SHA ~/devops-practice/final-project

            # Сохрани версию в файл
            echo $SHA > ~/current_version.txt
            echo "✅ Задеплоена версия: $SHA"

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ PROD деплой успешен!
          Версия: ${{ steps.version.outputs.SHA }}
          Сайт: http://${{ secrets.SERVER_HOST }}:8888"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ PROD деплой упал!
          Версия: ${{ steps.version.outputs.SHA }}
          Проверь: https://github.com/${{ github.repository }}/actions"
